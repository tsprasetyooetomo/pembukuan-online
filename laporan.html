<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
    <title>Laporan — Sistem Bisnis</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
        overscroll-behavior-y: contain;
      }

      #dashboardView {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        width: 100%;
        max-width: 900px;
        animation: fu 0.5s ease;
      }
      @keyframes fu {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #dashboardView h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, var(--accent), var(--info));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #dashboardView > p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 3rem;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
      }
      .menu-card {
        background: var(--card);
        border: 1px solid var(--brd);
        border-radius: 16px;
        padding: 2.5rem 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .menu-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--accent);
        transform: scaleX(0);
        transition: transform 0.3s ease;
      }
      .menu-card:hover {
        transform: translateY(-8px);
        border-color: var(--accent);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.4),
          0 0 20px var(--accent-dim);
      }
      .menu-card:hover::before {
        transform: scaleX(1);
      }
      .menu-card:active {
        transform: translateY(-2px);
      }
      .card-icon {
        font-size: 2.8rem;
        margin-bottom: 1.2rem;
      }
      .card-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 0.8rem;
      }
      .card-status {
        font-size: 0.7rem;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-weight: 600;
        font-family: "JetBrains Mono", monospace;
      }
      .status-online {
        background: rgba(34, 197, 94, 0.12);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .status-soon {
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }

      #viewerPanel {
        display: none;
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1200px;
        padding: 1rem;
        animation: fu 0.4s ease;
      }
      #viewerPanel.active {
        display: block;
      }
      .vp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        background: var(--card);
        border: 1px solid var(--brd);
        border-radius: var(--r);
      }
      .vp-header h2 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0;
      }
      .vp-actions {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .vp-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 6px 16px;
        border-radius: 8px;
        border: 1px solid var(--brd);
        background: var(--bg2);
        color: var(--fg);
        font-size: 0.8rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
        text-decoration: none;
      }
      .vp-back:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-logout {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 6px 16px;
        border-radius: 8px;
        border: 1px solid rgba(220, 38, 38, 0.4);
        background: rgba(220, 38, 38, 0.1);
        color: var(--danger);
        font-size: 0.8rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
      }
      .btn-logout:hover {
        background: rgba(220, 38, 38, 0.2);
        border-color: var(--danger);
      }
      #viewerContent {
        width: 100%;
        min-height: 50vh;
      }

      .footer-info {
        position: relative;
        z-index: 1;
        margin-top: 4rem;
        font-size: 0.7rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .db-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        animation: pls 2s infinite;
      }
      @keyframes pls {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .toast-box {
        position: fixed !important;
        top: 1rem !important;
        right: 1rem !important;
        bottom: auto !important;
        left: auto !important;
        z-index: 99999 !important;
      }
    </style>
  </head>
  <body>
    <div class="bg-g"></div>

    <div id="dashboardView">
      <h1>Laporan Eksekutif</h1>
      <p>Pilih modul laporan yang ingin Anda akses</p>
      <div class="menu-grid">
        <div class="menu-card" onclick="handleMenuClick('lapkeuangan')">
          <div class="card-icon">
            <i
              class="fa-solid fa-file-invoice-dollar"
              style="color: var(--success)"
            ></i>
          </div>
          <div class="card-title">Laporan Rugi Laba</div>
          <span class="card-status status-online">RL Rekap Gabungan</span>
        </div>

        <!-- ✅ KARTU MENU NERACA BARU -->
        <div class="menu-card" onclick="handleMenuClick('neraca')">
          <div class="card-icon">
            <i class="fa-solid fa-scale-balanced" style="color: #a855f7"></i>
          </div>
          <div class="card-title">Laporan Neraca</div>
          <span class="card-status status-online">Neraca Gabungan</span>
        </div>

        <div class="menu-card" onclick="handleMenuClick('aruskas')">
          <div class="card-icon">
            <i
              class="fa-solid fa-money-bill-transfer"
              style="color: var(--info)"
            ></i>
          </div>
          <div class="card-title">Arus Kas</div>
          <span class="card-status status-online">Arus Kas Gabungan</span>
        </div>
        <div class="menu-card" onclick="handleMenuClick('analisa')">
          <div class="card-icon">
            <i class="fa-solid fa-chart-pie" style="color: var(--accent)"></i>
          </div>
          <div class="card-title">Analisa</div>
          <span class="card-status status-soon">Segera Hadir</span>
        </div>
      </div>

      <!-- Logout di halaman dashboard juga -->
      <div style="margin-top: 2.5rem">
        <button
          class="btn-logout"
          onclick="doLogout()"
          style="padding: 8px 24px; font-size: 0.85rem"
        >
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>

    <div id="viewerPanel">
      <div class="vp-header">
        <h2 id="vpTitle">-</h2>
        <div class="vp-actions">
          <button class="vp-back" onclick="kembaliKeDashboard()">
            <i class="fa-solid fa-arrow-left"></i> Kembali
          </button>
          <button class="btn-logout" onclick="doLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>
      <div id="viewerContent"></div>
    </div>

    <div class="footer-info" id="footerInfo">
      <span class="db-dot"></span>
      <span>Powered by Supabase & Railway</span>
    </div>

    <div class="toast-box" id="toasts"></div>

    <script src="db_pbukuan.js"></script>
    <script src="app_core.js"></script>
    <script src="app_utility.js"></script>
    <script src="app_laporan.js"></script>
    <script src="app_laporan_gab.js"></script>

    <script>
      var URL_PEMBUKUAN = "pembukuan_telaga.html";

      (function () {
        var token = localStorage.getItem("token");
        var role = localStorage.getItem("role");
        if (!token || !role) {
          window.location.href = "index.html";
        } else if (role !== "Viewer") {
          window.location.href = URL_PEMBUKUAN;
        }
      })();

      function handleMenuClick(menu) {
        tampilkanViewerPanel(menu);
      }

      function kembaliKeDashboard() {
        document.getElementById("viewerPanel").classList.remove("active");
        document.getElementById("viewerPanel").style.display = "none";
        document.getElementById("dashboardView").style.display = "";
        document.getElementById("footerInfo").style.display = "";
        document.getElementById("viewerContent").innerHTML = "";
      }

      function tampilkanViewerPanel(menu) {
        document.getElementById("dashboardView").style.display = "none";
        document.getElementById("footerInfo").style.display = "none";
        var p = document.getElementById("viewerPanel");
        p.classList.add("active");
        p.style.display = "block";

        var t = document.getElementById("vpTitle");
        var c = document.getElementById("viewerContent");

        if (menu === "lapkeuangan") {
          t.textContent = "RL Rekap Gabungan";
          c.innerHTML = renderRLRekapGabungan();
        } else if (menu === "neraca") {
          // ✅ TANGANI RENDER UNTUK LAPORAN NERACA
          t.textContent = "Laporan Neraca ";
          c.innerHTML = renderNeraca();
        } else if (menu === "aruskas") {
          t.textContent = "Arus Kas Gabungan";
          c.innerHTML = renderArusKasGabungan();
        } else if (menu === "analisa") {
          t.textContent = "Analisa";
          c.innerHTML =
            '<div style="background:var(--card);padding:3rem;border-radius:var(--r);border:1px solid var(--brd);text-align:center;color:var(--muted)"><i class="fa-solid fa-chart-pie" style="font-size:3rem;color:var(--accent);display:block;margin-bottom:1rem"></i><h3 style="color:var(--fg);margin-bottom:.5rem">Modul Analisa</h3><p>Sedang dalam pengembangan.</p></div>';
        }
      }
    </script>
  </body>
</html>
