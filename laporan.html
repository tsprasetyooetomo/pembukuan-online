<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
    />
    <title>Laporan — Sistem Bisnis</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      :root {
        --bg: #080c14;
        --bg2: #0f1623;
        --card: #141c2e;
        --card2: #192340;
        --brd: #1c2844;
        --fg: #eaeef6;
        --muted: #6b7fa0;
        --accent: #f59e0b;
        --accent-dim: rgba(245, 158, 11, 0.1);
        --accent-glow: rgba(245, 158, 11, 0.3);
        --danger: #ef4444;
        --success: #22c55e;
        --info: #38bdf8;
        --r: 12px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow-y: auto;
        overscroll-behavior-y: contain;
      }

      .bg-g {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .bg-g::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            circle at 15% 15%,
            rgba(245, 158, 11, 0.04) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(56, 189, 248, 0.03) 0%,
            transparent 50%
          );
      }
      .bg-g::after {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(245, 158, 11, 0.012) 1px, transparent 1px),
          linear-gradient(90deg, rgba(245, 158, 11, 0.012) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gd 30s linear infinite;
      }
      @keyframes gd {
        to {
          transform: translate(40px, 40px);
        }
      }

      #dashboardView {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        width: 100%;
        max-width: 900px;
        animation: fu 0.5s ease;
      }
      @keyframes fu {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #dashboardView h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, var(--accent), var(--info));
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #dashboardView > p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 3rem;
      }
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 1.5rem;
      }
      .menu-card {
        background: var(--card);
        border: 1px solid var(--brd);
        border-radius: 16px;
        padding: 2.5rem 1.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        color: var(--fg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }
      .menu-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--accent);
        transform: scaleX(0);
        transition: transform 0.3s ease;
      }
      .menu-card:hover {
        transform: translateY(-8px);
        border-color: var(--accent);
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.4),
          0 0 20px var(--accent-dim);
      }
      .menu-card:hover::before {
        transform: scaleX(1);
      }
      .menu-card:active {
        transform: translateY(-2px);
      }
      .card-icon {
        font-size: 2.8rem;
        margin-bottom: 1.2rem;
      }
      .card-title {
        font-size: 1.2rem;
        font-weight: 700;
        margin-bottom: 0.8rem;
      }
      .card-status {
        font-size: 0.7rem;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-weight: 600;
        font-family: "JetBrains Mono", monospace;
      }
      .status-online {
        background: rgba(34, 197, 94, 0.12);
        color: var(--success);
        border: 1px solid rgba(34, 197, 94, 0.3);
      }
      .status-soon {
        background: rgba(245, 158, 11, 0.12);
        color: var(--accent);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }

      #viewerPanel {
        display: none;
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 1200px;
        padding: 1rem;
        animation: fu 0.4s ease;
      }
      #viewerPanel.active {
        display: block;
      }
      .vp-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.8rem;
        margin-bottom: 1rem;
        padding: 0.8rem 1rem;
        background: var(--card);
        border: 1px solid var(--brd);
        border-radius: var(--r);
      }
      .vp-header h2 {
        font-size: 1.1rem;
        font-weight: 700;
        margin: 0;
      }
      .vp-back {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 6px 16px;
        border-radius: 8px;
        border: 1px solid var(--brd);
        background: var(--bg2);
        color: var(--fg);
        font-size: 0.8rem;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.2s;
        text-decoration: none;
      }
      .vp-back:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      #viewerContent {
        width: 100%;
        min-height: 50vh;
      }

      .footer-info {
        position: relative;
        z-index: 1;
        margin-top: 4rem;
        font-size: 0.7rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .db-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--success);
        animation: pls 2s infinite;
      }
      @keyframes pls {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .toast-container {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        pointer-events: none;
      }
      .toast-item {
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        color: #fff;
        pointer-events: auto;
        animation: toastIn 0.3s ease;
        font-family: "Space Grotesk", sans-serif;
        max-width: 320px;
      }
      .toast-item.ok {
        background: #16a34a;
      }
      .toast-item.err {
        background: #dc2626;
      }
      .toast-item.wrn {
        background: #d97706;
      }
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-g"></div>

    <!-- ========== DASHBOARD ========== -->
    <div id="dashboardView">
      <h1>Laporan Eksekutif</h1>
      <p>Pilih modul laporan yang ingin Anda akses</p>
      <div class="menu-grid">
        <div class="menu-card" onclick="handleMenuClick('lapkeuangan')">
          <div class="card-icon">
            <i
              class="fa-solid fa-file-invoice-dollar"
              style="color: var(--success)"
            ></i>
          </div>
          <div class="card-title">Lap Keuangan</div>
          <span class="card-status status-online">RL Rekap Gabungan</span>
        </div>

        <div class="menu-card" onclick="handleMenuClick('aruskas')">
          <div class="card-icon">
            <i
              class="fa-solid fa-money-bill-transfer"
              style="color: var(--info)"
            ></i>
          </div>
          <div class="card-title">Arus Kas</div>
          <span class="card-status status-online">Arus Kas Gabungan</span>
        </div>

        <div class="menu-card" onclick="handleMenuClick('analisa')">
          <div class="card-icon">
            <i class="fa-solid fa-chart-pie" style="color: var(--accent)"></i>
          </div>
          <div class="card-title">Analisa</div>
          <span class="card-status status-soon">Segera Hadir</span>
        </div>
      </div>
    </div>

    <!-- ========== VIEWER PANEL ========== -->
    <div id="viewerPanel">
      <div class="vp-header">
        <h2 id="vpTitle">-</h2>
        <button class="vp-back" onclick="kembaliKeDashboard()">
          <i class="fa-solid fa-arrow-left"></i> Kembali ke Dashboard
        </button>
      </div>
      <div id="viewerContent"></div>
    </div>

    <!-- ========== FOOTER ========== -->
    <div class="footer-info" id="footerInfo">
      <span class="db-dot"></span>
      <span>Powered by Supabase & Railway</span>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
      var URL_PEMBUKUAN = "pembukuan_telaga.html";

      /* === CEK SESSION SAAT HALAMAN DIBUKA === */
      (function () {
        var token = localStorage.getItem("token");
        var role = localStorage.getItem("role");
        if (!token || !role) {
          window.location.href = "index.html";
        } else if (role !== "Viewer") {
          window.location.href = URL_PEMBUKUAN;
        }
        /* kalau Viewer, biarkan di halaman ini */
      })();

      function toast(m, t) {
        var c = document.getElementById("toastContainer"),
          e = document.createElement("div");
        e.className = "toast-item " + (t || "ok");
        e.textContent = m;
        c.appendChild(e);
        setTimeout(function () {
          if (e.parentNode) e.parentNode.removeChild(e);
        }, 3500);
      }

      /* === NAVIGASI === */
      function handleMenuClick(menu) {
        tampilkanViewerPanel(menu);
      }

      function kembaliKeDashboard() {
        document.getElementById("viewerPanel").classList.remove("active");
        document.getElementById("viewerPanel").style.display = "none";
        document.getElementById("dashboardView").style.display = "";
        document.getElementById("footerInfo").style.display = "";
        document.getElementById("viewerContent").innerHTML = "";
      }

      function tampilkanViewerPanel(menu) {
        document.getElementById("dashboardView").style.display = "none";
        document.getElementById("footerInfo").style.display = "none";
        var p = document.getElementById("viewerPanel");
        p.classList.add("active");
        p.style.display = "block";

        var t = document.getElementById("vpTitle");
        var c = document.getElementById("viewerContent");

        if (menu === "lapkeuangan") {
          t.textContent = "Lap Keuangan — RL Rekap Gabungan";
          c.innerHTML =
            '<div style="padding:3rem;text-align:center;color:var(--muted)">Fungsi renderRLRekapGabungan belum dimuat</div>';
        } else if (menu === "aruskas") {
          t.textContent = "Arus Kas Gabungan";
          c.innerHTML =
            '<div style="padding:3rem;text-align:center;color:var(--muted)">Fungsi renderArusKasGabungan belum dimuat</div>';
        } else if (menu === "analisa") {
          t.textContent = "Analisa";
          c.innerHTML =
            '<div style="background:var(--card);padding:3rem;border-radius:var(--r);border:1px solid var(--brd);text-align:center;color:var(--muted)"><i class="fa-solid fa-chart-pie" style="font-size:3rem;color:var(--accent);display:block;margin-bottom:1rem"></i><h3 style="color:var(--fg);margin-bottom:.5rem">Modul Analisa</h3><p>Sedang dalam pengembangan.</p></div>';
        }
      }
    </script>
  </body>
</html>
