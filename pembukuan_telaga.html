<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Sistem Pembukuan — SQLite</title>

    <!-- Link ke CSS Eksternal -->
    <link rel="stylesheet" href="style.css" />

    <!-- External Libraries -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      /* CSS Tambahan sementara untuk tombol hide (Pindahkan ke style.css agar rapi) */
      .sb-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .sb-hd-title {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 700;
        font-size: 1rem;
      }
      .sb-toggle-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .sb-toggle-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>

  <body>
    <div class="bg-g"></div>
    <div class="toast-box" id="toasts"></div>

    <aside class="sb" id="sidebar">
      <!-- AREA HEADER SIDEBAR -->
      <div class="sb-hd">
        <div class="sb-hd-title">
          <i class="fa-solid fa-book-open"></i><span>Pembukuan</span>
        </div>
        <!-- Tombol Hide (Panek Kanan) -->
        <button
          type="button"
          class="sb-toggle-btn"
          id="btnToggleMenu"
          title="Sembunyikan Menu"
        >
          <i class="fa-solid fa-angles-right"></i>
        </button>
      </div>

      <div class="sb-body" id="sbBody"></div>
      <div class="sb-ft"><span class="db-dot"></span> Sqlite Connected</div>
    </aside>

    <div class="main">
      <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 0.6rem">
          <!-- Tombol Toggle Mobile (Saya tambahkan type="button" sebagai perbaikan bug refresh) -->
          <button class="mob-toggle" id="btnHamburger">
            <i class="fas fa-bars"></i>
          </button>
          <!-- === TOMBOL REFRESH BARU === -->
          <button
            onclick="window.location.reload()"
            style="
              background: rgba(255, 255, 255, 0.1);
              border: none;
              color: #fff;
              width: 32px;
              height: 32px;
              border-radius: 4px;
              cursor: pointer;
              margin-right: 10px;
              display: flex;
              align-items: center;
              justify-content: center;
            "
            title="Refresh Halaman"
          >
            <i class="fa-solid fa-rotate-right"></i>
          </button>
          <!-- ========================== -->
          <div class="tb-title" id="tbTitle">
            <i class="fa-solid fa-database"></i> Memuat...
          </div>
        </div>
        <div class="tb-actions">
          <span
            style="
              font-size: 0.7rem;
              color: var(--muted);
              font-family: &quot;JetBrains Mono&quot;, monospace;
            "
            id="clockEl"
          ></span>
        </div>
      </div>
      <div class="content" id="contentArea" style="position: relative">
        <div class="loading-ov" id="loadingOv">
          <span><span class="spinner"></span> Membuka database...</span>
        </div>
      </div>
    </div>

    <div class="m-ov" id="modalOv">
      <div class="m-box" id="modalBox">
        <div class="m-hd">
          <h3 id="modalTitle">Form</h3>
          <button type="button" class="m-x" id="modalClose">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="m-bd" id="modalBody"></div>
        <div class="m-ft" id="modalFoot"></div>
      </div>
    </div>

    <!-- Debug Terminal -->
    <!-- <div id="debugTerminal">
      <div class="dbg-header">
        <span>⚡ DEBUG CONSOLE</span>
        <button
          onclick="
            document.getElementById('debugTerminal').classList.remove('show')
          "
        >
          X
        </button>
      </div>
      <div id="debugLogs"></div>
    </div>-->
    <!-- LOGIN OVERLAY -->
    <div
      id="loginOverlay"
      style="
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.95);
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        style="
          background: var(--card, #fff);
          padding: 2rem;
          border-radius: 12px;
          width: 100%;
          max-width: 380px;
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        "
      >
        <div style="text-align: center; margin-bottom: 1.5rem">
          <i
            class="fa-solid fa-building-columns"
            style="
              font-size: 2.5rem;
              color: var(--accent, #3b82f6);
              margin-bottom: 0.5rem;
            "
          ></i>
          <h2 style="margin: 0; font-size: 1.3rem">Sistem Pembukuan</h2>
          <p style="margin: 0; font-size: 0.8rem; color: var(--muted, #6b7280)">
            Masuk ke akun cabang Anda
          </p>
        </div>

        <div
          id="loginError"
          style="
            display: none;
            background: #fef2f2;
            color: #dc2626;
            padding: 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-align: center;
          "
        ></div>

        <div class="fg" style="margin-bottom: 1rem">
          <label>Username</label>
          <input
            type="text"
            id="loginUser"
            placeholder="Masukkan username"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 6px;
              border: 1px solid #d1d5db;
            "
          />
        </div>

        <div class="fg" style="margin-bottom: 1.2rem">
          <label>Password</label>
          <input
            type="password"
            id="loginPass"
            placeholder="Masukkan password"
            style="
              width: 100%;
              padding: 10px;
              border-radius: 6px;
              border: 1px solid #d1d5db;
            "
          />
        </div>

        <button
          id="btnLogin"
          class="btn btn-a"
          style="width: 100%; padding: 12px; font-size: 1rem; font-weight: bold"
          onclick="doLogin()"
        >
          <i class="fa-solid fa-right-to-bracket"></i> MASUK
        </button>
      </div>
    </div>
    <!-- 1. Database (WAJIB PERTAMA) -->
    <script src="db_pbukuan.js"></script>

    <!-- 2. Core (WAJIB KEDUA) -->
    <script src="app_core.js"></script>
    <!-- 3. Debug & Modul -->
    <!-- <script src="debug.js"></script>-->
    <script src="app_perkiraan.js"></script>
    <!-- Modul lain yang di-comment tetap bisa diaktifkan kembali -->
    <script src="app_mutasi.js"></script>

    <script src="app_laporan_kas.js"></script>
    <script src="app_posting.js"></script>
    <script src="app_laporan.js"></script>
    <script src="app_utility.js"></script>
    <script src="app_user.js"></script>
    <!-- Tambahkan Modul Baru Impor FoxPro Di Sini -->
    <script src="app_login.js"></script>
    <script src="app_impor_foxpro.js"></script>
    <!-- 4. Init (WAJIB TERAKHIR) -->
    <script src="app_init.js"></script>
    <!-- SCRIPT UNTUK FUNGSI HIDE MENU -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var btnToggle = document.getElementById("btnToggleMenu");
        var btnHamburger = document.getElementById("btnHamburger");
        var sidebar = document.getElementById("sidebar");
        var iconToggle = btnToggle.querySelector("i");

        // Fungsi untuk menyembunyikan menu
        function hideMenu() {
          sidebar.classList.add("hidden-menu");
          sidebar.classList.remove("open"); // Hapus kelas open mobile
          iconToggle.classList.remove("fa-angles-left");
          iconToggle.classList.add("fa-angles-right"); // Ikon jadi panah kanan (untuk buka)
        }

        // Fungsi untuk menampilkan menu
        function showMenu() {
          sidebar.classList.remove("hidden-menu");
          sidebar.classList.remove("open"); // Hapus kelas open mobile agar tidak menutupi konten di desktop
          iconToggle.classList.remove("fa-angles-right");
          iconToggle.classList.add("fa-angles-left"); // Ikon jadi panah kiri (untuk hide)
        }

        // Event saat tombol panah di sidebar diklik
        btnToggle.addEventListener("click", function () {
          if (sidebar.classList.contains("hidden-menu")) {
            showMenu();
          } else {
            hideMenu();
          }
        });

        // Event saat tombol hamburger di top-bar diklik
        btnHamburger.addEventListener("click", function () {
          if (sidebar.classList.contains("hidden-menu")) {
            showMenu(); // Jika sedang di-hide, buka kembali
          } else {
            // Jika normal, gunakan perilaku mobile biasa (toggle kelas 'open')
            sidebar.classList.toggle("open");
          }
        });
      });
    </script>
  </body>
</html>
