<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Sistem Pembukuan — Supabase</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Library untuk membaca file DBF di Browser -->
    <script src="https://cdn.jsdelivr.net/npm/dbf-reader@1.1.0/dist/dbf-reader.min.js"></script>
    <style>
      .sb-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .sb-hd-title {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-weight: 700;
        font-size: 1rem;
      }
      .sb-toggle-btn {
        background: rgba(255, 255, 255, 0.1);
        border: none;
        color: #fff;
        width: 28px;
        height: 28px;
        border-radius: 5px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      .sb-toggle-btn:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* ✅ GANTI SEMUA LOGIKA HIDDEN MENU MENJADI INI: */

      .sb {
        transition: margin-left 0.3s ease; /* Biar smooth saat slide masuk/keluar */
      }

      .main {
        transition: margin-left 0.3s ease;
      }
      .sidebar.hidden-menu + .main {
        margin-left: 0 !important;
      }

      /* Tambahan CSS untuk Container Login agar rapi */
      .login-container {
        padding: 20px;
        max-width: 300px;
        margin: 50px auto;
        border: 1px solid #ccc;
        border-radius: 8px;
        background: #fff;
        display: none;
      }
      .login-container input {
        width: 100%;
        margin-bottom: 10px;
        padding: 8px;
        box-sizing: border-box;
      }
      .login-container button {
        width: 100%;
        padding: 10px;
        background: #000;
        color: #fff;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="bg-g"></div>
    <div class="toast-box" id="toasts"></div>

    <aside class="sb" id="sidebar">
      <div class="sb-hd">
        <div class="sb-hd-title">
          <i class="fa-solid fa-book-open"></i><span>Pembukuan-Kasir</span>
        </div>
        <button
          type="button"
          class="sb-toggle-btn"
          id="btnToggleMenu"
          title="Sembunyikan Menu"
        >
          <i class="fa-solid fa-angles-left"></i>
        </button>
      </div>
      <div class="sb-body" id="sbBody"></div>
      <div class="sb-ft"><span class="db-dot"></span> Supabase Connected</div>
    </aside>

    <div class="main">
      <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 0.6rem">
          <button type="button" class="mob-toggle" id="btnHamburger">
            <i class="fas fa-bars"></i>
          </button>
          <button
            onclick="refreshApp()"
            style="
              background: rgba(255, 255, 255, 0.1);
              border: none;
              color: #fff;
              width: 32px;
              height: 32px;
              border-radius: 4px;
              cursor: pointer;
              display: flex;
              align-items: center;
              justify-content: center;
            "
            title="Refresh Data"
          >
            <i class="fa-solid fa-rotate-right"></i>
          </button>
          <div class="tb-title" id="tbTitle">
            <i class="fa-solid fa-database"></i> Memuat...
          </div>
        </div>
        <div class="tb-actions">
          <span
            style="
              font-size: 0.7rem;
              color: var(--muted);
              font-family: &quot;JetBrains Mono&quot;, monospace;
            "
            id="clockEl"
          ></span>
          <button
            id="btnLogout"
            onclick="doLogout()"
            style="
              background: #dc2626;
              border: none;
              color: #fff;
              padding: 6px 12px;
              border-radius: 4px;
              cursor: pointer;
              font-size: 0.75rem;
            "
            title="Logout"
          >
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>

      <div class="content" id="contentArea" style="position: relative">
        <div class="loading-ov" id="loadingOv">
          <span><span class="spinner"></span> Membuka database...</span>
        </div>

        <!-- Box Login dipindahkan ke dalam area konten/modal agar lebih terstruktur -->
        <div class="login-container" id="loginBox">
          <h3 style="color: #ffd700">Login Sistem</h3>

          <input type="text" id="username" placeholder="Masukkan Username" />
          <input
            type="password"
            id="password"
            placeholder="Masukkan Password"
          />
          <button onclick="loginSystem()">LOGIN</button>
        </div>
      </div>
    </div>

    <!-- Modal global untuk form/dialog -->
    <div class="m-ov" id="modalOv">
      <div class="m-box" id="modalBox">
        <div class="m-hd">
          <h3 id="modalTitle">Form</h3>
          <button type="button" class="m-x" id="modalClose">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="m-bd" id="modalBody"></div>
        <div class="m-ft" id="modalFoot"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="db_pbukuan.js"></script>
    <script src="app_core.js"></script>
    <script src="app_perkiraan.js"></script>
    <script src="app_mutasi.js"></script>
    <script src="app_laporan_kas.js"></script>
    <script src="app_posting.js"></script>
    <script src="app_laporan.js"></script>
    <script src="app_laporan_gab.js"></script>
    <script src="app_utility.js"></script>
    <script src="app_user.js"></script>
    <script src="app_impor_foxpro.js"></script>
    <script src="app_login.js"></script>
    <script src="app_init.js"></script>
    <script>
      function refreshApp() {
        if (
          typeof navigate === "function" &&
          typeof currentPanel !== "undefined"
        ) {
          showLoading();
          setTimeout(() => {
            navigate(currentPanel);
            hideLoading();
            toast("Data berhasil diperbarui", "ok");
          }, 300);
        } else {
          window.location.reload();
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        var btnToggle = document.getElementById("btnToggleMenu");
        var btnHamburger = document.getElementById("btnHamburger");
        var sidebar = document.getElementById("sidebar");
        var iconToggle = btnToggle.querySelector("i");

        function hideMenu() {
          sidebar.classList.add("hidden-menu");
          sidebar.classList.remove("open");
          iconToggle.classList.remove("fa-angles-left");
          iconToggle.classList.add("fa-angles-right");
        }

        function showMenu() {
          sidebar.classList.remove("hidden-menu");
          iconToggle.classList.remove("fa-angles-right");
          iconToggle.classList.add("fa-angles-left");
        }

        btnToggle.addEventListener("click", function () {
          if (sidebar.classList.contains("hidden-menu")) {
            showMenu();
          } else {
            hideMenu();
          }
        });

        btnHamburger.addEventListener("click", function (e) {
          e.stopPropagation();
          // ✅ SUDAH DIPERBAIKI: Mengubah { menjadi ) di baris bawah ini
          if (sidebar.classList.contains("hidden-menu")) {
            showMenu();
          } else {
            sidebar.classList.toggle("open");
          }
        });

        document.addEventListener("click", function (e) {
          if (
            window.innerWidth <= 768 &&
            sidebar.classList.contains("open") &&
            !sidebar.contains(e.target) &&
            !btnHamburger.contains(e.target)
          ) {
            sidebar.classList.remove("open");
          }
        });
      });
      // Contoh fungsi handler ketika item menu diklik (sesuaikan dengan framework/sistem Anda)
      function onMenuClick(menuId) {
        // Sembunyikan semua view menu terlebih dahulu
        document.getElementById("view-migrasiFisik").style.display = "none";
        // ... sembunyikan view lainnya ...

        // Tampilkan view yang dipilih
        if (menuId === "migrasiFisik") {
          document.getElementById("view-migrasiFisik").style.display = "block";
        }
      }

      // Fungsi utama penembak API streaming data
      async function eksekusiMigrasiSSE() {
        const btn = document.getElementById("btnMulaiMigrasi");
        const panel = document.getElementById("panelProgress");
        const txtTabel = document.getElementById("txtNamaTabel");
        const txtPersen = document.getElementById("txtPersen");
        const bar = document.getElementById("barPersen");
        const terminal = document.getElementById("boxLogTerminal");

        // Kunci tombol agar tidak diklik dua kali
        btn.disabled = true;
        btn.style.background = "#6c757d";
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memproses Data...`;

        panel.style.display = "block";
        terminal.innerHTML = "🔌 Menyambungkan ke server Railway...\n";

        try {
          // Tembak endpoint POST SSE yang sudah dibuat sebelumnya
          const response = await fetch(
            "/api/migrasi-kolom-fisik?secret=ubahdata2024",
            {
              method: "POST",
            },
          );

          const reader = response.body.getReader();
          const decoder = new TextDecoder();

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");

            for (const line of lines) {
              if (line.startsWith("data: ")) {
                // Konversi baris teks streaming menjadi objek JSON asli
                const payload = JSON.parse(line.replace("data: ", ""));

                // 1. Update teks log di terminal hitam
                terminal.innerHTML += `> ${payload.message}\n`;
                terminal.scrollTop = terminal.scrollHeight; // Auto scroll ke bawah

                // 2. Ambil informasi tabel yang sedang dikerjakan
                if (payload.table) {
                  txtTabel.innerText = payload.table.toUpperCase();
                }

                // 3. Update animasi grafik persentase
                if (payload.percent !== undefined) {
                  txtPersen.innerText = `${payload.percent}%`;
                  bar.style.width = `${payload.percent}%`;
                }

                // 4. Deteksi tanda selesai dari server
                if (payload.status === "done") {
                  btn.innerHTML = `<i class="fas fa-check"></i> Selesai Sukses`;
                  btn.style.background = "#28a745";
                  terminal.innerHTML += `\n[FINISH] Hubungan diputus secara aman. Database sudah sinkron.\n`;
                  alert(
                    "🎉 Sukses! Seluruh data transaksi & master berhasil dimigrasi ke kolom fisik.",
                  );
                }
              }
            }
          }
        } catch (err) {
          terminal.innerHTML += `\n🔴 ERROR KONEKSI: ${err.message}\n`;
          btn.disabled = false;
          btn.style.background = "#007bff";
          btn.innerHTML = `<i class="fas fa-play"></i> Coba Ulangi Migrasi`;
        }
      }
    </script>
  </body>
</html>
