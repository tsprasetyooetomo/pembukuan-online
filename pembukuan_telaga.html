<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Sistem Pembukuan — SQLite</title>

    <!-- Link ke CSS Eksternal -->
    <link rel="stylesheet" href="style.css" />

    <!-- External Libraries -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  </head>

  <body>
    <div class="bg-g"></div>
    <div class="toast-box" id="toasts"></div>

    <aside class="sb" id="sidebar">
      <div class="sb-hd">
        <i class="fa-solid fa-book-open"></i><span>Pembukuan</span>
      </div>
      <div class="sb-body" id="sbBody"></div>
      <div class="sb-ft"><span class="db-dot"></span> Sqlite Connected</div>
    </aside>

    <div class="main">
      <div class="top-bar">
        <div style="display: flex; align-items: center; gap: 0.6rem">
          <!-- Tombol Toggle Mobile (Saya tambahkan type="button" sebagai perbaikan bug refresh) -->
          <button type="button" class="mob-toggle" id="mobToggle">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="tb-title" id="tbTitle">
            <i class="fa-solid fa-database"></i> Memuat...
          </div>
        </div>
        <div class="tb-actions">
          <span
            style="
              font-size: 0.7rem;
              color: var(--muted);
              font-family: &quot;JetBrains Mono&quot;, monospace;
            "
            id="clockEl"
          ></span>
        </div>
      </div>
      <div class="content" id="contentArea" style="position: relative">
        <div class="loading-ov" id="loadingOv">
          <span><span class="spinner"></span> Membuka database...</span>
        </div>
      </div>
    </div>

    <div class="m-ov" id="modalOv">
      <div class="m-box" id="modalBox">
        <div class="m-hd">
          <h3 id="modalTitle">Form</h3>
          <button type="button" class="m-x" id="modalClose">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="m-bd" id="modalBody"></div>
        <div class="m-ft" id="modalFoot"></div>
      </div>
    </div>

    <!-- Debug Terminal -->
    <div id="debugTerminal">
      <div class="dbg-header">
        <span>⚡ DEBUG CONSOLE</span>
        <button
          onclick="
            document.getElementById('debugTerminal').classList.remove('show')
          "
        >
          X
        </button>
      </div>
      <div id="debugLogs"></div>
    </div>
    <!-- TAMBAHKAN INI: Library Pull to Refresh -->
    <!-- Pastikan library load sebelum script inisialisasi -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pulltorefreshjs/0.1.14/pulltorefresh.umd.min.js"></script>

    <!-- SCRIPTS -->
    <!-- INISIALISASI PULL TO REFRESH -->
    <!-- HAPUS kata "type" dan tulis langsung script biasa agar bisa membaca global var -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Cek apakah library sudah ada di window
        if (window.PullToRefresh) {
          PullToRefresh.init({
            mainElement: "body",
            onRefresh: function () {
              return new Promise(function (resolve) {
                setTimeout(function () {
                  window.location.reload();
                  resolve();
                }, 500);
              });
            },
            instructionsPullToRefresh: "Tarik ke bawah untuk refresh",
            instructionsReleaseToRefresh: "Lepaskan untuk refresh",
            instructionsRefreshing: "Memuat...",
          });
          console.log("✅ Pull To Refresh Aktif");
        } else {
          console.warn("⚠️ Library PullToRefresh tidak ditemukan");
        }

        // Kode inisialisasi map (jika ada)
        // if (typeof PANEL_MAP !== 'undefined') { ... }
      });
    </script>
    <!-- 1. Database (WAJIB PERTAMA) -->
    <script src="db_pbukuan.js"></script>

    <!-- 2. Core (WAJIB KEDUA) -->
    <script src="app_core.js"></script>
    <!-- 3. Debug & Modul -->
    <!-- <script src="debug.js"></script>-->
    <script src="app_perkiraan.js"></script>
    <!-- Modul lain yang di-comment tetap bisa diaktifkan kembali -->
    <script src="app_mutasi.js"></script>

    <script src="app_laporan_kas.js"></script>
    <script src="app_posting.js"></script>
    <script src="app_laporan.js"></script>
    <script src="app_utility.js"></script>
    <script src="app_user.js"></script>

    <!-- 4. Init (WAJIB TERAKHIR) -->
    <script src="app_init.js"></script>
  </body>
</html>
